name: Build & Deploy to Scaleway

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: env
    if: contains(github.event.head_commit.message, '/prod')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: stencil-app/package.json

      - name: Install dependencies
        working-directory: stencil-app
        run: npm install

      - name: Build
        working-directory: stencil-app
        run: npm run build

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Sync to Scaleway Object Storage
        env:
          RCLONE_CONFIG_SCW_TYPE: s3
          RCLONE_CONFIG_SCW_PROVIDER: Scaleway
          RCLONE_CONFIG_SCW_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          RCLONE_CONFIG_SCW_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          RCLONE_CONFIG_SCW_REGION: fr-par
          RCLONE_CONFIG_SCW_ENDPOINT: s3.fr-par.scw.cloud
          BUCKET_NAME: ${{ secrets.SCW_BUCKET_NAME }}
        run: |
          # Sync all assets with long-lived caching (hashed filenames), except index.html
          rclone sync stencil-app/dist/ scw:${BUCKET_NAME}/ \
            --exclude "index.html" \
            --header-upload "Cache-Control: public, max-age=31536000, immutable" \
            --transfers 8

          # Upload index.html with no-cache so updates are picked up immediately
          rclone copyto stencil-app/dist/index.html scw:${BUCKET_NAME}/index.html \
            --header-upload "Cache-Control: no-cache, no-store, must-revalidate"
