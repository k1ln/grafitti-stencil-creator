name: Build & Deploy to Scaleway

on:
  push:

jobs:
  deploy:
    if: contains(github.event.head_commit.message, '/prod')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: stencil-app/package.json

      - name: Install dependencies
        working-directory: stencil-app
        run: npm install

      - name: Build
        working-directory: stencil-app
        run: npm run build

      - name: Deploy to Scaleway Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.SCW_REGION }}
        run: |
          ENDPOINT="https://s3.${{ secrets.SCW_REGION }}.scw.cloud"

          # Upload all assets (hashed filenames, long cache)
          aws s3 sync stencil-app/dist/ s3://stenciltool-bucket/ \
            --endpoint-url "$ENDPOINT" \
            --exclude "index.html" \
            --acl public-read \
            --delete

          # Upload index.html with no-cache
          aws s3 cp stencil-app/dist/index.html s3://stenciltool-bucket/index.html \
            --endpoint-url "$ENDPOINT" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --acl public-read

